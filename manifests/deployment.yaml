apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-web
  namespace: dulina
  labels:
    app: html-site
spec:
  replicas: 2
  selector:
    matchLabels:
      app: html-site
  template:
    metadata:
      labels:
        app: html-site
    spec:
      containers:
      - name: nginx-container
        image: dulina03/htmlpage2:v26
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
